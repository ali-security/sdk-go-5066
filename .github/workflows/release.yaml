name: Release Pipeline

on:
  push:
    branches:
      - release-*

env:
  VERSION: v2.15.0

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21.x
          cache-dependency-path: v2/go.sum

      - name: Create Archive
        run: |
          VERSION=${{ env.VERSION }}
          MODULE_PATH="github.com/cloudevents/sdk-go/v2@${VERSION}"
          
          # Create module structure
          mkdir -p "staging/${MODULE_PATH}"
          
          # Copy v2 module contents to the correct path
          cp -r v2/* "staging/${MODULE_PATH}/"
          
          # Create the zip with proper structure
          cd staging
          zip -r "../${VERSION}.zip" .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.VERSION }}
          path: ${{ env.VERSION }}.zip

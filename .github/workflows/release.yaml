name: Release Pipeline

on:
  push:
    branches:
      - release-*

jobs:
  semver:
    name: Calculate Next Release
    runs-on: ubuntu-latest
    outputs:
      next: v2.15.0-sp1
    steps:
      - name: Set Version
        run: echo "Using fixed version v2.15.0-sp1"

  mainmodule:
    name: Release Main Module
    runs-on: ubuntu-latest
    needs: semver
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Archive
        run: |
          zip -r ${{ needs.semver.outputs.next }}.zip . -x ".git/*"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.semver.outputs.next }}
          path: ${{ needs.semver.outputs.next }}.zip

  submodules:
    name: Release Sub-Modules
    runs-on: ubuntu-latest
    needs:
      - semver
      - mainmodule
    env:
      VERSION: ${{ needs.semver.outputs.next }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21.x
          cache-dependency-path: v2/go.sum

      - run: git pull

      - name: Update Modules
        run: |
          ./hack/tag-release.sh

      - name: Commit Repoint
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git diff-index --quiet HEAD || (git commit -a -m "Repoint modules for release ${{ needs.semver.outputs.next }}." --allow-empty && git push)

      - name: Tag Modules
        run: ./hack/tag-release.sh --tag --push

  examples:
    name: Update Examples
    runs-on: ubuntu-latest
    needs:
      - semver
      - mainmodule
      - submodules
    env:
      VERSION: ${{ needs.semver.outputs.next }}
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21.x
          cache-dependency-path: v2/go.sum

      - name: Checkout Code
        uses: actions/checkout@v4
      - run: git pull

      - name: Update Examples
        run: ./hack/tag-release.sh --samples

      - name: Commit Repoint
        env:
          tag: ${{ matrix.module }}/${{ needs.semver.outputs.next }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git diff-index --quiet HEAD || (git commit -a -m "Repoint examples, post release ${{ needs.semver.outputs.next }}." --allow-empty && git push)
